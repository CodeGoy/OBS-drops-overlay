<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        html,body {
            background-color:#000000;
            height:100%;
            width:100%;
            padding:0;
            margin:0;
            color: #ffffff;
        }
        #videoProgress, #musicProgress {
            width: 95%;
        }
        #leftEM, #rightEM{
            background-color: black;
            border: red 1px solid;
            width: 50%;
            position: fixed;
            overflow: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #leftEM {
            height: 100%;
            top: 0;
            left: 0;
        }
        #rightEM {
            top: 0;
            right: 0;
            height: 100%
        }
        .button {
            background-color: black;
            border: red 1px solid;
            color: white;
            margin: 6px;
            padding: 12px;
        }
        button:not(:active) {
            transition: background-color 10ms step-end;
        }
        button:active {
            background: red;
        }
        #status {
            float: right;
            width: 33%;
            right: 0;
            top: 0;
            border: red solid 1px;
        }
        br {
            padding-top: 5px;
            margin: 5px;
        }
        .controlSubDiv {
            padding-bottom: 10px;
            border: red 1px solid;
        }
        .toolsMenuButton {
            border: red 1px solid;
            position: fixed;
            right: 0;
            top: 0;
            z-index: 9998;
        }
        .tools {
            z-index: 9999;
            width: fit-content;
            position: fixed;
            top: 0;
            right: 0;
            height: fit-content;
            overflow: hidden;
            border: red 1px solid;
        }
        .toolsButton {
            background-color: black;
            border: red 1px solid;
            color: white;
            margin: 0;
            padding: 12px;
        }
        .outline {
            border: red 1px solid;
            padding: 10px;
        }
    </style>
    <title>drops-control v{{ .Version }}</title>
</head>
<body>
    <button onclick="toolsMenuToggle()" class="toolsButton toolsMenuButton">☰</button>
    <div id="toolsMenu" class="tools" style="visibility: hidden;">
        <button class="toolsButton" onclick="midiSelectPopup();">MIDI</button>
        <button class="toolsButton" onclick="testOverlay();">TestFrame</button>
        <button class="toolsButton" onclick="openUpload();">Upload</button>
        <button class="toolsButton" onclick="load();">Reload</button>
        <button class="toolsButton" onclick="toolsMenuToggle();">☰</button>
    </div>
    <div id="leftEM">
        <div id="status">
            <span id="connectionStatus"></span>
            <span id="overlayStatus"></span>
        </div>
        <h1 style="margin: 0">Audio</h1>
        <div id="audioControl" class="controlSubDiv">
            <button class="button" onmousedown="sendControlMessage('audio', 'stop', 'type')">Stop</button>
            <label for="audioVolume">Volume</label><input type="range" value=1.0 step=0.01 max=1 min=0 id="audioVolume" onchange="setVolume(this.value, 'audioVolume')">
            <br>
            <label for="playbackRate">PlaybackRate</label><input type="range" value=1.0 step=0.1 max=2.0 min=0.4 id="playbackRate" onchange="setVolume(this.value, 'playbackRate');document.getElementById('playbackRateValue').innerText = this.value">
            <span id="playbackRateValue">1.0</span>
            <button class="button" onmousedown="setVolume('1', 'playbackRate');document.getElementById('playbackRate').value = 1;document.getElementById('playbackRateValue').innerText = '1'">[1.0]</button>
            <br>
            <label for="echoChecked">Echo<input type="checkbox" id="echoChecked"></label>
            <label for="echoDelay">Delay<input min="35" max="250" value="50" step="1" type="range" id="echoDelay" onchange="setEchoDelay(this.value);document.getElementById('echoDelayValue').innerText = this.value"></label>
            <span id="echoDelayValue"></span>
        </div>
        <div id="dropsAudio"></div>
        <h1 style="margin: 0">VideoLoop</h1>
        <div id="videoLoopControls" class="controlSubDiv">
            <button class="button" onmousedown="videoLoopControl('start')">Start</button>
            <button class="button" onmousedown="videoLoopControl('stop')">Stop</button>
            <button class="button" style="float: right" onmousedown="videoLoopNext = true">Next</button>
        </div>
        <div id="videoLoopTitles"></div>
    </div>
    <div id="rightEM">
        <h1 style="margin: 0">Video</h1>
        <div id="videoControl" class="controlSubDiv">
            <label for="vid">videoFile/Url:</label>
            <input value="" type="text" id="vid">
            <br>
            <button class="button" onmousedown="sendControlMessage('video', 'stop', '');">Stop</button>
            <button class="button" onmousedown="sendControlMessage('video', 'play', document.getElementById('vid').value)">Send</button>
            <button class="button" onmousedown="sendControlMessage('video', 'pr', '');">Pause/Resume</button>
            <label for="videoRepeatEm" class="outline">Repeat
                <input type="checkbox" id="videoRepeatEm" onchange="setVideoRepeat(this.checked)">
            </label>
            <span id="videoPlayerState" style="color: green">Ready</span>
            <br>
            <label for="videoVolume">Volume
                <input type="range" value=1.0 step=0.01 max=1 min=0 id="videoVolume" onchange="setVolume(this.value, 'videoVolume')">
            </label>
            <br>
            <label for="videoPlaybackRate">PlaybackRate
                <input type="range" value=1.0 step=0.1 max=2 min=0.2 id="videoPlaybackRate" onchange="setVolume(this.value, 'videoPlaybackRate');document.getElementById('videoPlaybackRateValue').innerText = this.value;">
                <span id="videoPlaybackRateValue">1</span>
            </label>
            <button class="button" onmousedown="setVolume('1', 'videoPlaybackRate');document.getElementById('videoPlaybackRate').value = 1;document.getElementById('videoPlaybackRateValue').innerText = '1'">[1.0]</button>
            <br>
            <label for="videoProgress">Progress<span id="videoProgressIntEm"></span></label><input type="range" min=0  step=0.01 max=10 onmouseover="videoProgressInteraction = true" onmouseout="videoProgressInteraction = false" id="videoProgress" onclick="sendControlMessage('video', 'seek', document.getElementById('videoProgress').value);">
        </div>
        <div id="dropsVideo"></div>
        <h1 style="margin: 0">Music</h1>
        <div id="musicControl" class="controlSubDiv">
            <button class="button" onmousedown="stopMusic();">Stop</button>
            <label for="musicVolume">Volume</label><input type="range" value=0.2 step=0.01 max=1 min=0 id="musicVolume" onchange="setVolume(this.value, 'musicVolume');">
            <button class="button" style="float: right" onmousedown="continuousPlay(0);">loop all</button>
            <br>
            <span id="musicCurrentFilename">Not Playing</span>
            <button id="musicNextButton" class="button" style="float: right" onmousedown="next = true;">next</button>
            <br>
            <label style="float: right" for="musicAnnounce">Announce:</label><input style="float: right" type="checkbox" id="musicAnnounce">
            <label for="musicProgress">Progress:
                <span id="musicProgressIntEm">00:00:00/00:00:00</span>
            </label>
            <input onmouseover="musicProgressInteraction = true" onmouseout="musicProgressInteraction = false" type="range" min=0  step=0.01 max=10 id="musicProgress" onclick="sendControlMessage('music', 'seek', document.getElementById('musicProgress').value);">
        </div>
        <div id="music"></div>
    </div>
    <script>
        // TODO : save binds in browser storage, allow for rebinding, remove binds with dead links
        console.log("Version: {{ .Version }}");

        let musicCurrentFilename = document.getElementById("musicCurrentFilename");
        let videoProgressIntEm = document.getElementById("videoProgressIntEm");
        let musicProgressIntEm = document.getElementById("musicProgressIntEm");
        let connectionStatusEm = document.getElementById("connectionStatus");
        let videoLoopTitlesEm = document.getElementById("videoLoopTitles");
        let videoPlayerState = document.getElementById("videoPlayerState");
        let overlayStatusEm = document.getElementById("overlayStatus");
        let musicProgress = document.getElementById("musicProgress");
        let videoProgress = document.getElementById("videoProgress");
        let musicAnnounce = document.getElementById("musicAnnounce");
        let echoChecked = document.getElementById("echoChecked");
        let audioDropEm = document.getElementById("dropsAudio");
        let videoDropEm = document.getElementById("dropsVideo");
        let toolsMenu = document.getElementById('toolsMenu');
        let musicEm = document.getElementById("music");

        let ws;
        let host = location.host;
        let overlayStatus = false;
        let connectionStatus = false;
        let latestOverlayConnectionTime;
        let listUrl = `http://${host}/list?type=`;
        let wsAddress = `ws://${host}/controlWS`;
        let videoProgressInteraction = false;
        let videoProgressDuration = 0;
        let videoProgressCurrent = 0;
        let videoRepeat = false;
        let videoLoopNext = false;
        let videoLoopTitles = [];
        let videoLoopInterval = null;
        let videoLoopPosition = 0;
        let musicProgressInteraction;
        let musicProgressDuration;
        let musicProgressCurrent;
        let musicInterval = null;
        let audioFiles = [];
        let next = false;
        let loopVideoSwitch = false;

        let testOverlay = () => {
            if (!document.getElementById('test')) {
                document.body.insertAdjacentHTML('beforeend', `<div id="test" style="position: fixed ;z-index: max()-1; bottom: 0; left: 0; width: 25%;height: 25%; border: red solid 1px; background-color: black;color: white"><iframe style="z-index: max();height: 100%; width: 100%" src="/overlay"></iframe><button onmousedown="document.getElementById('test').remove()" style="position: fixed ;z-index: max(); bottom: 0; left: 0; border: green solid 1px; background-color: black;color: white;">close</button></div>`);
                let testDiv = document.getElementById('test');
                let initResize = () => {
                    window.addEventListener('mousemove', Resize, false);
                    window.addEventListener('mouseup', stopResize, false);
                }
                let Resize = (e) => {
                    testDiv.style.width = (e.clientX + testDiv.offsetLeft) + 'px';
                    testDiv.style.height = (window.innerHeight - e.clientY) + 'px';
                }
                let stopResize = () => {
                    window.removeEventListener('mousemove', Resize, false);
                    window.removeEventListener('mouseup', stopResize, false);
                }
                let resizer = document.createElement('div');
                resizer.className = 'resizer';
                resizer.style.width = '10px';
                resizer.style.height = '10px';
                resizer.style.background = 'red';
                resizer.style.position = 'absolute';
                resizer.style.right = '0';
                resizer.style.top = '0';
                resizer.style.cursor = "ne-resize";
                testDiv.appendChild(resizer);
                resizer.addEventListener('mousedown', initResize, false);
            } else {
                console.log("testing frame already open");
            }
        };
        let toolsMenuToggle = () => {
            if (toolsMenu.style.visibility === "visible") {
                toolsMenu.style.visibility = "hidden";
            } else {
                toolsMenu.style.visibility = "visible";
            }
        };
        let openUpload = () => {
            document.getElementById("rightEM").insertAdjacentHTML("beforeend",`<div id="uploadDiv" style="position: fixed;right: 0;top: 0;background-color: black;width: 50%;height: 85%">
    <button onmousedown="document.getElementById('uploadDiv').remove()" style="float: right;position: fixed">close</button>
    <iframe style="height: 100%;width: 100%" src="/uploadAsset"></iframe>
</div>`)
        };
        let timeFix = (seconds) => {
            const date = new Date(0);
            date.setSeconds(seconds);
            let rn;
            try {
                rn = date.toISOString().substring(19, 11);
            } catch (e) {
                console.log(`error: Failed to parse seconds ${seconds}: ${e}`);
                return;
            }
            return rn;
        };
        let continuousPlay = (index) => {
            let position = index;
            next = false;
            musicCurrentFilename.innerText = `${audioFiles[position]}`;
            sendControlMessage('music', 'play', `music/${audioFiles[position]}`);
            if (musicAnnounce.checked) {
                sendControlMessage('music', 'announce', `${audioFiles[position].substring(0, audioFiles[position].lastIndexOf('.'))}`);
            }
            musicInterval = setInterval(() => {
                if (musicProgressCurrent+2 > musicProgressDuration || next) {
                    next = false;
                    clearInterval(musicInterval);
                    musicInterval = null;
                    position++;
                    if (position > audioFiles.length-1) {
                        position = 0;
                    }
                    continuousPlay(position);
                }
            }, 1000);
        };
        let processMessage = (msg) => {
            let pj;
            try {
                pj = JSON.parse(msg.data);
            }
            catch (e) {
                console.error("Failed to parse json", e);
                return;
            }
            let action = pj["a"];
            let key = pj["k"];
            let value = pj["v"];
            switch (action) {
                case  "status":
                    latestOverlayConnectionTime = Date.now();
                    overlayStatus = true;
                    setStatus();
                    break;
                case "video":
                    switch (key) {
                        case "progress":
                            if (!videoProgressInteraction) {
                                videoProgress.value = value;
                            }
                            videoProgressCurrent = value;
                            break;
                        case "duration":
                            videoProgress.max = value;
                            videoProgressDuration = value;
                            break;
                        case "state":
                            videoPlayerState.innerText = value;
                            switch (value) {
                                case "playing":
                                    videoPlayerState.style.color = "green";
                                    break;
                                case "ready":
                                    videoProgress.max = 1;
                                    videoProgress.value = 0;
                                    videoPlayerState.style.color = "green";
                                    videoProgressCurrent = 0;
                                    videoProgressDuration = 0;
                                    break;
                                case "paused":
                                    videoPlayerState.style.color = "red";
                                    break;
                            }
                    }
                    videoProgressIntEm.innerText = `${timeFix(videoProgressCurrent)}/${timeFix(videoProgressDuration)}`;
                    break;
                case "music":
                    switch (key) {
                        case "progress":
                            if (!musicProgressInteraction) {
                                musicProgress.value = value;
                            }
                            musicProgressCurrent = value;
                            break;
                        case "duration":
                            musicProgress.max = value;
                            musicProgressDuration = value;
                            break;
                    }
                    musicProgressIntEm.innerText = `${timeFix(musicProgressCurrent)}/${timeFix(musicProgressDuration)}`;
                    break;
                case "error":
                    console.log(`ERROR:: action = ${action} : key = ${key} : value = : ${value}`);
                    alert("overlay returned an error, check console output");
            }
        };
        let connect = () => {
            console.log(`connecting to ${wsAddress}`);
            ws = new WebSocket(wsAddress);
            ws.onopen = function() {
                connectionStatus = true;
                setStatus();
                console.log(`connected to ${wsAddress}`);
            };
            ws.onmessage = function(event) {processMessage(event)};
            ws.onclose = function() {
                connectionStatus = false;
                setStatus();
                console.log('Socket is closed. Reconnect will be attempted in 5 second(s).');
                ws = null;
            };
            ws.onerror = function(err) {
                console.error('Socket encountered error: ', err.message, 'Closing socket');
                ws.close();
            };
        };
        let sendControlMessage = (action, key, value) => {
            ws.send(JSON.stringify({a: action, k: key, v: value}));
        };
        let setEchoDelay = (delay) => {
            sendControlMessage("audio", "echoDelay", delay);
        }
        let setStatus = () => {
            try {
                if (connectionStatus) {
                    connectionStatusEm.innerText = "Server";
                    connectionStatusEm.style.color = "green";
                } else {
                    connectionStatusEm.innerText = "Server";
                    connectionStatusEm.style.color = "red";
                }
                if (overlayStatus) {
                    overlayStatusEm.innerText = "Overlay";
                    overlayStatusEm.style.color = "green";
                } else {
                    overlayStatusEm.innerText = "Overlay";
                    overlayStatusEm.style.color = "red";
                }
            }
            catch (e) {
                console.log("failed to get element");
            }
        };
        let sendAudio = (url) => {
            if (echoChecked.checked) {
                sendControlMessage("audio", "echo", url);
            } else {
                sendControlMessage("audio", "play", url);
            }
        };
        let setVolume = (level, type) => {
            sendControlMessage("volume", type, level);
        };
        let addDrop = (filename) => {
            let filenameExt = filename.substring(filename.length - 4);
            let currentFilename = filename.substring(0, filename.lastIndexOf('.'));
            switch (filenameExt) {
                case ".mp3":
                    audioDropEm.insertAdjacentHTML("beforeend", `<button class="button" id="audio_${currentFilename}" onmousedown="sendAudio('drops/${filename}')">${currentFilename}</button>`);
                    break;
                case ".mp4":
                    videoDropEm.insertAdjacentHTML("beforeend", `<button class="button" id="video_mp4_${currentFilename}" onmousedown="sendControlMessage('video', 'play', 'drops/${filename}')">${currentFilename}</button>`);
                    break;
                case ".mkv":
                    videoDropEm.insertAdjacentHTML("beforeend", `<button class="button" id="video_mkv_${currentFilename}" onmousedown="sendControlMessage('video', 'play', 'drops/${filename}')">${currentFilename}</button>`);
                    break;
            }
        };
        let loadDrops = () => {
            fetch(`${listUrl}drops`).then(response => {
                return response.json();
            }).then(data => {
                data["files"].forEach((value) => {
                    addDrop(value);
                })
            }).catch(err => {
                console.log("error", err);
            });
        };
        let addMusic = (filename, n) => {
            let filenameExt = filename.substring(filename.length - 4);
            let currentMusicFilename = filename.substring(0, filename.lastIndexOf("."));
            if (filenameExt === ".mp3") {
                audioFiles.push(filename);
                musicEm.insertAdjacentHTML("beforeend", `<button class="button" id="music_${currentMusicFilename}" onmousedown="if (musicInterval !== null ) {
    clearInterval(musicInterval);
    musicInterval = null;
    continuousPlay(${n});
} else {
    sendControlMessage('music', 'play', 'music/${filename}');
    musicCurrentFilename.innerText = '${filename}';
}
if (musicAnnounce.checked) {
        sendControlMessage('music', 'announce', '${currentMusicFilename}');
}">${currentMusicFilename}</button>`);
            }
        };
        let stopMusic = () => {
            sendControlMessage('music', 'stop', '');
            clearInterval(musicInterval);
            musicInterval = null;
            musicCurrentFilename.innerText = 'Not Playing';
            musicProgressIntEm.innerText = '00:00:00/00:00:00';
        }
        let loadMusic = () => {
            audioFiles = [];
            fetch(`${listUrl}music`).then(response => {
                return response.json();
            }).then(data => {
                let df = data["files"];
                for (let i = 0; i < df.length; i++) {
                    addMusic(df[i], i);
                }
            }).catch(err => {
                console.log("error", err);
            });
        };
        let playingColor = (filename) => {
            const div = document.querySelectorAll('#videoLoopTitles *');
            div.forEach(child => {
                child.style.color = "white";
            });
            let rmExt = filename.substring(0, filename.lastIndexOf('.'));
            let ce = document.getElementById(rmExt)
            ce.style.color = "green";
        }
        let setVideoRepeat = (vr) => {
            videoRepeat = vr;
            ws.send(JSON.stringify({a: "video", k: "loop", v: String(vr)}));
        }
        let playLoopVideo = (index) => {
            if (loopVideoSwitch) {
                sendControlMessage('video', 'play', `videoLoop/${videoLoopTitles[index]}`)
                playingColor(videoLoopTitles[index]);
                setTimeout(() => { // wait for video to begin playing before starting loop interval
                    videoLoopInterval = setInterval(() => {
                        if ( videoProgressCurrent > 1 && (videoProgressDuration-videoProgressCurrent < 0.2 || videoLoopNext))  {
                            clearInterval(videoLoopInterval);
                            videoLoopNext = false;
                            if (index===videoLoopTitles.length-1 ) {
                                playLoopVideo(0);
                            } else {
                                playLoopVideo(index + 1);
                            }
                        }
                    }, 100)
                },1000);
            }
        }
        let videoLoopControl = (action) => {
            switch (action) {
                case "start":
                    loopVideoSwitch = true;
                    videoLoopPosition = 0;
                    playLoopVideo(0);
                    break;
                case "stop":
                    loopVideoSwitch = false;
                    videoLoopPosition = 0;
                    sendControlMessage('video', 'stop', '')
                    break;
            }
        }
        let addLoopVideo = (filename) => {
            let filenameExt = filename.substring(filename.length - 4);
            if (filenameExt === ".mkv" || filenameExt === ".mp4") {
                videoLoopTitles.push(filename);
                let rmExt = filename.substring(0, filename.lastIndexOf('.'));
                videoLoopTitlesEm.insertAdjacentHTML("beforeend", `<button class="button" style="margin: 2px" id="${rmExt}">${rmExt}</button>`);
            }
        };
        let loadLoopVideoTitles = () => {
            videoLoopTitles = [];
            fetch(`${listUrl}videoLoop`).then(response => {
                return response.json();
            }).then(data => {
                data["files"].forEach((value) => {
                    addLoopVideo(value);
                })
            }).catch(err => {
                console.log("error", err);
            });
        };
        ///////// MIDI ////////
        let currentTargetID = null;
        let midiDevices = [];
        let midiSelectPopup = () => {
            try {
                navigator.requestMIDIAccess().then(onMIDISuccess, onMIDIFailure);
            } catch (error) {
                alert("MIDI access denied or failed:"+ error);
            }
            document.body.insertAdjacentHTML('beforeend', `<div class="midiSelect" id="midiSelect" style="z-index: 1982;border: 1px solid red;position: fixed;left: 0; top: 0; padding: 10px; background: black"><button onclick="document.getElementById('midiSelect').remove()">X</button></div>`);
        };
        let onMIDISuccess = (midiAccess) => {
            const inputs = midiAccess.inputs;
            let ms = document.getElementById('midiSelect');
            for (const entry of inputs) {
                let input = entry[1];
                midiDevices.push(input)
                ms.insertAdjacentHTML("beforeend", `<div><button onclick="setMidiDevice('${input.name}');document.getElementById('midiSelect').remove()">${input.name}</button></div>`)
            }
        };
        let setMidiDevice = (input) => {
            midiDevices.forEach((value) => {
                if (input === value.name) {
                    value.onmidimessage = handleMIDIMessage
                }
            })
        };
        function onMIDIFailure(error) {
            console.error(`Could not access your MIDI devices: ${error}`);
        }
        let keyBinds = new Map();
        function mapRange(value, inMin, inMax, outMin, outMax) {
            return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
        }
        let handleMIDIMessage = (event) => {
            const key = event.data[1];
            const value = event.data[2];
            if (!keyBinds.has(key)) {
                let cti = currentTargetID;
                let targetElement = document.getElementById(cti);
                if (targetElement && cti != null) {
                    let tagName = targetElement.tagName.toLowerCase();
                    let tagType = targetElement.type;
                    if (tagName === 'input' && tagType === 'range') {
                        if (cti === "musicProgress" || cti === "videoProgress") {
                            // Progress input
                            keyBinds.set(key, (v) => {
                                let tem = document.getElementById(cti);
                                tem.value = mapRange(v, 0.0, 127.0,  parseFloat(targetElement.min), parseFloat(targetElement.max));
                                const event = new Event('change');
                                tem.click();
                                tem.dispatchEvent(event);
                            });
                        } else {
                            // Fixed Ranged input
                            let targetMax = parseFloat(targetElement.max);
                            let targetMin = parseFloat(targetElement.min);
                            keyBinds.set(key, (v) => {
                                let tem = document.getElementById(cti);
                                tem.value = mapRange(v, 0.0, 127.0, targetMin, targetMax);
                                const event = new Event('change');
                                tem.click();
                                tem.dispatchEvent(event);
                            });
                        }
                    } else {
                        // Button
                        keyBinds.set(key, (v) => {
                            if (v === 0) {
                                return;
                            }
                            let tem = document.getElementById(cti);
                            const event = new Event('mousedown');
                            tem.dispatchEvent(event);
                        });
                    }
                } else {
                    return false;
                }
                currentTargetID = null;
            } else {
                keyBinds.get(key)(value);
            }
        }
        //////// connection status ////////
        let checkConnectionStatus = () => {
            let endTime = Date.now();
            let elapsedTime = endTime - latestOverlayConnectionTime;
            if (elapsedTime > 2000) {
                console.log("More than 2000ms elapsed without overlay contact, assuming disconnected");
                overlayStatus = false;
                setStatus();
            }
        };
        let load = () => {
            musicEm.innerHTML = "";
            audioDropEm.innerHTML = "";
            videoDropEm.innerHTML = "";
            videoLoopTitlesEm.innerHTML = "";
            loadDrops();
            loadMusic();
            loadLoopVideoTitles();
        };
        window.addEventListener('load', () => {
            console.log('All assets are loaded');
            document.addEventListener('mousedown', (e) => {
                currentTargetID = e.target.id;
            });
            connect();
            load();
            setInterval(() => {
                checkConnectionStatus();
                if (!connectionStatus) {
                    console.log("Socket is closed, connecting...");
                    connect();
                }
            }, 3000);
        })
    </script>
</body>
</html>
